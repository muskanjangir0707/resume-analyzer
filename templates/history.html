<!DOCTYPE html>
<html>

<head>

<title>Resume History</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <body>

<div class="container">

<h2>Resume Upload History</h2>

<table border="1">

<tr>

<th>ID</th>
<th>Job Role</th>
<th>ATS Score</th>
<th>Match Score</th>
<th>Date</th>

</tr>

{% for row in history %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}%</td>
<td>{{ row[3] }}%</td>
<td>{{ row[4] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">

<button>

Back to Analyzer

</button>

</a>
</div>
</body>

</html>
