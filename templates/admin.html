<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet"
 <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.container {
    text-align: center;
    padding: 30px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 230px;
    box-shadow: 2px 2px 10px gray;
}

.chart-box {
    width: 600px;
    margin: 40px auto;
}

</style>

</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<hr>

<div class="cards">

<div class="card">
<h3>Total Resumes</h3>
<h2>{{ total }}</h2>
</div>

<div class="card">
<h3>Average ATS Score</h3>
<h2>{{ average }}%</h2>
</div>

<div class="card">
<h3>Most Selected Role</h3>
<h2>{{ role }}</h2>
</div>

</div>

<hr>

<h2>ATS Score Trend</h2>

<div class="chart-box">

<canvas id="trendChart"></canvas>

</div>

<br>

<a href="/">

<button>
Back to Analyzer
</button>

</a>
<br><br>

<a href="/export_excel">

<button>
Download Excel Report
</button>

</a>
</div>

<script>

const ids = JSON.parse('{{ ids | tojson | safe }}');
const scores = JSON.parse('{{ scores | tojson | safe }}');;

const ctx =
document.getElementById("trendChart");

new Chart(ctx, {

type: "line",

data: {

labels: ids,

datasets: [{

label: "ATS Score",

data: scores,

fill: false,

tension: 0.3

}]

},

options: {

responsive: true,

scales: {

y: {

beginAtZero: true,

max: 100

}

}

}

});

</script>

</body>

</html>
