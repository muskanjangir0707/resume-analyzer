<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Admin Dashboard</h1>

    <hr>

    <div class="card">
        <h3>Total Resumes</h3>
        <h2>{{ total }}</h2>
    </div>

    <div class="card">
        <h3>Average ATS Score</h3>
        <h2>{{ average }}%</h2>
    </div>

    <div class="card">
        <h3>Most Selected Role</h3>
        <h2>{{ role }}</h2>
    </div>

    <br>

    <a href="/">
        <button>Back to Analyzer</button>
    </a>

</div>

</body>
</html>
